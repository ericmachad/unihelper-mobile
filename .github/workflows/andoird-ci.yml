name: Android CI (Kotlin & Compose)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Dar permissão de execução ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Checar formatação e regras de Lint (Qualidade de Código)
        run: ./gradlew lintDebug

      - name: Rodar Testes Unitários Locais
        run: ./gradlew testDebugUnitTest

      - name: Construir APK de Debug
        run: ./gradlew assembleDebug

      - name: Salvar APK de Debug
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk